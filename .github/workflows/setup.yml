name: Setup Workflow

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest]
    steps:
    - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
    - name: Run curl Setup
      run: curl https://raw.githubusercontent.com/Coordinate-Cat/dotfiles/master/install.sh
    - name: Run dotfiles setup
      run: /bin/bash install.sh